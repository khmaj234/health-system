<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
منظومة الرعاية الصحية
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;
background:#eef3fb;
padding:20px;
color:#222;
overflow-x:hidden;

}

.splash{

position:fixed;
top:0;
right:0;
width:100%;
height:100%;
background:#0b57d0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:9999;
animation:hideSplash 1s ease forwards;
animation-delay:2.5s;

}

.splash-title{

font-size:42px;
color:white;
font-weight:bold;
margin-bottom:20px;
animation:fadeUp 1.2s ease;

}

.splash-sub{

font-size:22px;
color:#dfe9ff;
animation:fadeUp 1.8s ease;

}

.loader{

width:70px;
height:70px;
border:6px solid rgba(255,255,255,.3);
border-top:6px solid white;
border-radius:50%;
margin-top:35px;
animation:spin 1s linear infinite;

}

@keyframes spin{

100%{
transform:rotate(360deg);
}

}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@keyframes hideSplash{

to{
opacity:0;
visibility:hidden;
}

}

.container{

max-width:850px;
margin:auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,.08);

}

h1{

text-align:center;
margin-bottom:10px;
color:#0b57d0;
font-size:38px;

}

.welcome{

text-align:center;
margin-bottom:30px;
font-size:18px;
color:#666;

}

.search-box{

margin-bottom:30px;

}

input{

width:100%;
padding:18px;
font-size:20px;
border:2px solid #d6e2ff;
border-radius:14px;
outline:none;
transition:.3s;

}

input:focus{

border-color:#0b57d0;

}

button{

width:100%;
padding:18px;
font-size:20px;
margin-top:15px;
background:#0b57d0;
color:white;
border:none;
border-radius:14px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0847ad;
transform:translateY(-2px);

}

button:disabled{

background:#8eaee6;
cursor:not-allowed;
transform:none;

}

.loading{

text-align:center;
font-size:20px;
padding:20px;
color:#0b57d0;

}

.success{

background:#e8f7ee;
color:#1f8b4c;
padding:15px;
border-radius:14px;
margin-bottom:25px;
font-size:18px;
font-weight:bold;
text-align:center;

}

.warning{

background:#fff8e1;
color:#b78103;
padding:15px;
border-radius:14px;
margin-top:20px;
font-size:18px;
font-weight:bold;
text-align:center;

}

.card{

margin-top:25px;
padding:25px;
background:#f9fbff;
border-radius:20px;
border:1px solid #dbe6ff;

}

.section{

margin-bottom:35px;

}

.section-title{

font-size:28px;
margin-bottom:18px;
color:#0b57d0;
padding-bottom:10px;
border-bottom:2px solid #dbe6ff;

}

.item{

font-size:19px;
line-height:2;
margin-bottom:12px;

}

.transactions{

margin-top:20px;

}

.transaction{

padding:18px;
border-radius:16px;
margin-bottom:18px;
line-height:2;
font-size:18px;

}

.transaction-month{

font-size:22px;
font-weight:bold;
margin-bottom:10px;

}

.transaction-status{

font-weight:bold;
margin-bottom:8px;

}

.transaction-value{

font-size:18px;

}

.transaction-note{

margin-top:12px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,.5);

}

.green{

background:#e8f7ee;
color:#1f8b4c;
border:1px solid #bfe3cd;

}

.yellow{

background:#fff8e1;
color:#b78103;
border:1px solid #f0d98c;

}

.red{

background:#ffeaea;
color:#cc2f2f;
border:1px solid #efb2b2;

}

.status{

display:inline-block;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
font-size:18px;

}

.notes{

margin-top:12px;
padding:16px;
background:#fff8eb;
border-radius:12px;
line-height:2;

}

.update-box{

background:#edf4ff;
padding:18px;
border-radius:16px;
font-size:18px;

}

.not-found{

text-align:center;
font-size:22px;
padding:30px;

}

.footer{

text-align:center;
margin-top:40px;
color:#777;
font-size:15px;

}

@media(max-width:700px){

.container{

padding:20px;

}

h1{

font-size:30px;

}

.section-title{

font-size:24px;

}

.item{

font-size:17px;

}

button,input{

font-size:18px;

}

.transaction-month{

font-size:20px;

}

.splash-title{

font-size:30px;

}

.splash-sub{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="splash">

<div class="splash-title">
أهلاً بكم
</div>

<div class="splash-sub">
في منظومة الرعاية الصحية
</div>

<div class="loader"></div>

</div>

<div class="container">

<h1>
منظومة الرعاية الصحية
</h1>

<div class="welcome">

يرجى إدخال الرقم الوظيفي للاستعلام

</div>

<div class="search-box">

<input
type="text"
id="employeeId"
placeholder="أدخل الرقم الوظيفي"
>

<button
id="searchBtn"
onclick="searchEmployee()"
>
بحث
</button>

</div>

<div id="result"></div>

<div class="footer">

جميع الحقوق محفوظة - محمد خالد خماج  © 2026

</div>

</div>

<script>

const input =
document.getElementById("employeeId");

input.addEventListener("keypress", function(event){

if(event.key === "Enter"){

searchEmployee();

}

});

function getStatusClass(text){

if(text.includes("🟢")) return "green";

if(text.includes("🟡")) return "yellow";

if(text.includes("🔴")) return "red";

return "";

}

function searchEmployee(){

const id =
document.getElementById("employeeId").value.trim();

const result =
document.getElementById("result");

const button =
document.getElementById("searchBtn");

if(id === ""){

result.innerHTML = `

<div class="warning">

يرجى إدخال الرقم الوظيفي

</div>

`;

return;

}

button.disabled = true;

button.innerText = "جاري البحث...";

result.innerHTML = `

<div class="loading">

جاري البحث...

</div>

`;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSh0UzXhLBqgq-zI0a7E9_ZX9Dq2cuX82oHB0gaEnUHv56GbswOB_Lyjq19x6G9vg/pub?gid=1222508533&single=true&output=csv")

.then(response => response.text())

.then(data => {

const rows =
data.split("\n");

let found = false;

for(let i = 1; i < rows.length; i++){

const cols =
rows[i].split(",");

if(cols[0].trim() === id){

found = true;

let notesHTML = "";

if(cols[8].trim() !== ""){

const notes =
cols[8].split("-");

notes.forEach(note => {

if(note.trim() !== ""){

notesHTML += `
<div class="item">
• ${note.trim()}
</div>
`;

}

});

}else{

notesHTML = `
<div class="item">
🟢 لا توجد ملاحظات على المعاملة
</div>
`;

}

let transactionsHTML = "";

const transactions =
cols[9].split("###");

transactions.forEach(item => {

const statusClass =
getStatusClass(item);

const parts =
item.split("|");

const month =
parts[0] || "";

const status =
parts[1] || "";

const value =
parts[2] || "";

const note =
parts[3] || "";

transactionsHTML += `

<div class="transaction ${statusClass}">

<div class="transaction-month">
${month}
</div>

<div class="transaction-status">
${status}
</div>

<div class="transaction-value">
${value} دينار
</div>

${note ? `
<div class="transaction-note">
${note}
</div>
` : ""}

</div>

`;

});

const lastStatusClass =
getStatusClass(cols[7]);

result.innerHTML = `

<div class="success">

تم العثور على بيانات الموظف بنجاح

</div>

<div class="card">

<div class="section">

<div class="section-title">
البيانات الأساسية
</div>

<div class="item">
الاسم الكامل:
${cols[1]}
</div>

<div class="item">
الرقم الوظيفي:
${cols[0]}
</div>

<div class="item">
الحالة الاجتماعية:
${cols[2]}
</div>

</div>

<div class="section">

<div class="section-title">
البيانات المالية
</div>

<div class="item">
قيمة آخر معاملة:
${cols[4]} دينار
</div>

</div>

<div class="section">

<div class="section-title">
حالة آخر معاملة
</div>

<div class="status ${lastStatusClass}">
${cols[7]}
</div>

</div>

<div class="section">

<div class="section-title">
ملاحظات المعاملة
</div>

<div class="notes">

${notesHTML}

</div>

</div>

<div class="section">

<div class="section-title">
معاملات سنة ${cols[11]}
</div>

<div class="transactions">

${transactionsHTML}

</div>

</div>

<div class="section">

<div class="section-title">
آخر تحديث
</div>

<div class="update-box">

آخر معاملة تم فحصها بتاريخ
${cols[10]}

</div>

</div>

</div>

`;

}

}

button.disabled = false;

button.innerText = "بحث";

if(!found){

result.innerHTML = `

<div class="card not-found">

لا توجد بيانات لهذا الرقم الوظيفي

</div>

`;

}

})

.catch(error => {

button.disabled = false;

button.innerText = "بحث";

result.innerHTML = `

<div class="card not-found">

حدث خطأ أثناء جلب البيانات

</div>

`;

console.log(error);

});

}

</script>

</body>

</html>
