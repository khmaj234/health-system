<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
منظومة الرعاية الصحية
</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial;
background:#eef3fb;
padding:20px;
color:#222;

}

.container{

max-width:850px;
margin:auto;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 35px rgba(0,0,0,.08);

}

h1{

text-align:center;
margin-bottom:10px;
color:#0b57d0;
font-size:38px;

}

.welcome{

text-align:center;
margin-bottom:30px;
font-size:18px;
color:#666;

}

.search-box{

margin-bottom:30px;

}

input{

width:100%;
padding:18px;
font-size:20px;
border:2px solid #d6e2ff;
border-radius:14px;
outline:none;
transition:.3s;

}

input:focus{

border-color:#0b57d0;

}

button{

width:100%;
padding:18px;
font-size:20px;
margin-top:15px;
background:#0b57d0;
color:white;
border:none;
border-radius:14px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#0847ad;
transform:translateY(-2px);

}

.loading{

text-align:center;
font-size:20px;
padding:20px;
color:#0b57d0;

}

.card{

margin-top:25px;
padding:25px;
background:#f9fbff;
border-radius:20px;
border:1px solid #dbe6ff;

}

.section{

margin-bottom:35px;

}

.section-title{

font-size:28px;
margin-bottom:18px;
color:#0b57d0;
padding-bottom:10px;
border-bottom:2px solid #dbe6ff;

}

.item{

font-size:19px;
line-height:2;
margin-bottom:12px;

}

.transactions{

margin-top:20px;

}

.transaction{

padding:18px;
border-radius:16px;
margin-bottom:18px;
line-height:2;
font-size:18px;
font-weight:bold;

}

.green{

background:#e8f7ee;
color:#1f8b4c;
border:1px solid #bfe3cd;

}

.yellow{

background:#fff8e1;
color:#b78103;
border:1px solid #f0d98c;

}

.red{

background:#ffeaea;
color:#cc2f2f;
border:1px solid #efb2b2;

}

.status{

display:inline-block;
padding:12px 18px;
border-radius:12px;
font-weight:bold;
font-size:18px;

}

.notes{

margin-top:12px;
padding:16px;
background:#fff8eb;
border-radius:12px;
line-height:2;

}

.update-box{

background:#edf4ff;
padding:18px;
border-radius:16px;
font-size:18px;

}

.not-found{

text-align:center;
font-size:22px;
padding:30px;

}

.footer{

text-align:center;
margin-top:40px;
color:#777;
font-size:15px;

}

@media(max-width:700px){

.container{

padding:20px;

}

h1{

font-size:30px;

}

.section-title{

font-size:24px;

}

.item{

font-size:17px;

}

button,input{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="container">

<h1>
منظومة الرعاية الصحية
</h1>

<div class="welcome">

يرجى إدخال الرقم الوظيفي للاستعلام

</div>

<div class="search-box">

<input
type="text"
id="employeeId"
placeholder="أدخل الرقم الوظيفي"
>

<button onclick="searchEmployee()">
بحث
</button>

</div>

<div id="result"></div>

<div class="footer">

منظومة الرعاية الصحية © 2026

</div>

</div>

<script>

const input =
document.getElementById("employeeId");

input.addEventListener("keypress", function(event){

if(event.key === "Enter"){

searchEmployee();

}

});

function getStatusClass(text){

if(text.includes("🟢")) return "green";

if(text.includes("🟡")) return "yellow";

if(text.includes("🔴")) return "red";

return "";

}

function searchEmployee(){

const id =
document.getElementById("employeeId").value.trim();

const result =
document.getElementById("result");

result.innerHTML = `

<div class="loading">

جاري البحث...

</div>

`;

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSYFUqh50DXB_tn25j3Y6l-Abj5Q-unTCKC78J0gSEuWudg8hzrSq0Nlof7yeR7sKQDCff3YZYXqui0/pub?gid=1266511690&single=true&output=csv")

.then(response => response.text())

.then(data => {

const rows =
data.split("\n");

let found = false;

for(let i = 1; i < rows.length; i++){

const cols =
rows[i].split(",");

if(cols[0].trim() === id){

found = true;

let notesHTML = "";

if(cols[8].trim() !== ""){

const notes =
cols[8].split("-");

notes.forEach(note => {

if(note.trim() !== ""){

notesHTML += `
<div class="item">
• ${note.trim()}
</div>
`;

}

});

}else{

notesHTML = `
<div class="item">
🟢 لا توجد ملاحظات على المعاملة
</div>
`;

}

let transactionsHTML = "";

const transactions =
cols[9].split("###");

transactions.forEach(item => {

const statusClass =
getStatusClass(item);

transactionsHTML += `

<div class="transaction ${statusClass}">

${item.trim()}

</div>

`;

});

const lastStatusClass =
getStatusClass(cols[7]);

result.innerHTML = `

<div class="card">

<div class="section">

<div class="section-title">
البيانات الأساسية
</div>

<div class="item">
الاسم الكامل:
${cols[1]}
</div>

<div class="item">
الرقم الوظيفي:
${cols[0]}
</div>

<div class="item">
الحالة الاجتماعية:
${cols[2]}
</div>

<div class="item">
السقف المالي:
${cols[3]} دينار
</div>

</div>

<div class="section">

<div class="section-title">
البيانات المالية
</div>

<div class="item">
قيمة آخر معاملة:
${cols[4]} دينار
</div>

<div class="item">
المتبقي من السقف:
${cols[5]} دينار
</div>

<div class="item">
السلف:
${cols[6]}
</div>

</div>

<div class="section">

<div class="section-title">
حالة آخر معاملة
</div>

<div class="status ${lastStatusClass}">
${cols[7]}
</div>

</div>

<div class="section">

<div class="section-title">
ملاحظات المعاملة
</div>

<div class="notes">

${notesHTML}

</div>

</div>

<div class="section">

<div class="section-title">
معاملات سنة ${cols[11]}
</div>

<div class="transactions">

${transactionsHTML}

</div>

</div>

<div class="section">

<div class="section-title">
آخر تحديث
</div>

<div class="update-box">

آخر معاملة تم فحصها بتاريخ
${cols[10]}

</div>

</div>

</div>

`;

}

}

if(!found){

result.innerHTML = `

<div class="card not-found">

لا توجد بيانات لهذا الرقم الوظيفي

</div>

`;

}

})

.catch(error => {

result.innerHTML = `

<div class="card not-found">

حدث خطأ أثناء جلب البيانات

</div>

`;

console.log(error);

});

}

</script>

</body>

</html>
